                activeTypeSwitcherPathKey = pathToKey(pathArr);

                const dropdown = document.getElementById('typeSwitcher');
                const types = ['object', 'array', 'string', 'number', 'boolean', 'null'];
                let html = '';
                types.forEach(t => {
                    html += `
                <button data-new-type="${t}">
                  <span class="dot" style="background:${getTypeColor(t)};border:1px solid ${getTypeBorderColor(t)};"></span>
                  ${t.charAt(0).toUpperCase() + t.slice(1)}
                </button>`;
                });
                dropdown.innerHTML = html;
                dropdown.style.display = 'flex';

                const rect = badgeElement.getBoundingClientRect();
                let top = rect.bottom + 4;
                let left = rect.left;
                if (top + 230 > window.innerHeight) top = rect.top - 230;
                if (left + 145 > window.innerWidth) left = window.innerWidth - 155;
                if (left < 8) left = 8;
                dropdown.style.top = top + 'px';
                dropdown.style.left = left + 'px';

                dropdown.onclick = (e) => {
                    const btn = e.target.closest('button');
                    if (!btn) return;
                    const newType = btn.getAttribute('data-new-type');
                    changeNodeType(pathArr, newType);
                    closeTypeSwitcher();
                };
            }

            function closeTypeSwitcher() {
                const dropdown = document.getElementById('typeSwitcher');
                dropdown.style.display = 'none';
                dropdown.innerHTML = '';
                activeTypeSwitcherPathKey = null;
            }

            function changeNodeType(pathArr, newType) {
                const oldValue = getByPath(masterData, pathArr);
                const defaultValue = getDefaultValueForType(newType);
                let newValue = defaultValue;
                if (newType === 'string') newValue = String(oldValue ?? '');
                else if (newType === 'number') {
                    const n = parseFloat(oldValue);
                    newValue = isNaN(n) ? 0 : n;
                } else if (newType === 'boolean') newValue = Boolean(oldValue);
                else if (newType === 'null') newValue = null;
                else if (newType === 'object') newValue = {};
                else if (newType === 'array') newValue = [];

                setByPath(masterData, pathArr, newValue);
                if (newType === 'object' || newType === 'array') {
                    expandedPaths.add(pathToKey(pathArr));
                } else {
                    expandedPaths.delete(pathToKey(pathArr));
                }
                renderAll();
                updateOutput();
                toast(`Type changed to ${newType} 🔄`);
            }

            // ──────────────────────────────────────
            //  ADD ROOT PROPERTY
            // ──────────────────────────────────────
            function addRootProperty() {
                const rootType = getType(masterData);
                if (rootType === 'object' && !Array.isArray(masterData)) {
                    let newKey = 'newRootProp';
                    let c = 1;
                    while (newKey in masterData) {
                        newKey = 'newRootProp_' + c;
                        c++;
                    }
                    masterData[newKey] = '';
                    expandedPaths.add(pathToKey([]));
                } else if (Array.isArray(masterData)) {
                    masterData.push('');
                    expandedPaths.add(pathToKey([]));
                }
                renderAll();
                updateOutput();
                toast('Root property added 🌱');
            }

            // ──────────────────────────────────────
            //  OUTPUT ENGINE
            // ──────────────────────────────────────
            function updateOutput() {
                if (currentOutputFormat === 'json') {
                    exportData('json');
                } else {
                    exportData('yaml');
                }
            }

            function exportData(format) {
                currentOutputFormat = format;
                const pre = document.getElementById('outputPre');
                const tabs = document.querySelectorAll('.output-tab');
                tabs.forEach(t => t.classList.remove('active'));
                const activeTab = document.querySelector(`.output-tab[data-format="${format}"]`);
                if (activeTab) activeTab.classList.add('active');

                if (format === 'json') {
                    try {
                        const jsonStr = JSON.stringify(masterData, null, 2);
                        pre.textContent = jsonStr;
                    } catch (err) {
                        pre.textContent = '// Error: Invalid JSON structure\n' + err.message;
                    }
                } else if (format === 'yaml') {
                    try {
                        const yamlStr = toYAML(masterData, 0);
                        pre.textContent = yamlStr || '# Empty document';
                    } catch (err) {
                        pre.textContent = '# Error generating YAML\n# ' + err.message;
                    }
                }
            }

            function escapeYAMLString(str) {
                const specialChars = /[:{}\[\],&\*\?\|<>=!%@`#]/;
                if (specialChars.test(str) || str.trim() !== str || str === '') {
                    return `"${str.replace(/\\/g, '\\\\').replace(/"/g, '\\"')}"`;
                }
                return str;
            }

            function toYAML(data, indent) {
                const spaces = '  '.repeat(indent);
                const type = getType(data);

                if (type === 'null') return spaces + 'null';
                if (type === 'boolean') return spaces + (data ? 'true' : 'false');
                if (type === 'number') return spaces + String(data);
                if (type === 'string') return spaces + escapeYAMLString(data);
                if (type === 'array') {
                    if (data.length === 0) return spaces + '[]';
                    let result = '';
                    data.forEach((item) => {
                        const itemType = getType(item);
                        if (itemType === 'object' || itemType === 'array') {
                            result += spaces + '- \n';
                            result += toYAML(item, indent + 1).replace(/^ {2}/, '  ');
                        } else {
                            const itemYaml = toYAML(item, 0).trimStart();
                            result += spaces + '- ' + itemYaml + '\n';
                        }
                    });
                    return result.trimEnd() + '\n';
                }
                if (type === 'object') {
                    const keys = Object.keys(data);
                    if (keys.length === 0) return spaces + '{}';
                    let result = '';
                    keys.forEach(key => {
                        const value = data[key];
                        const valType = getType(value);
                        if (valType === 'object' || valType === 'array') {
                            result += spaces + escapeYAMLString(key) + ':\n';
                            result += toYAML(value, indent + 1);
                        } else {
                            const valYaml = toYAML(value, 0).trimStart();
                            result += spaces + escapeYAMLString(key) + ': ' + valYaml + '\n';
                        }
                    });
                    return result;
                }
                return spaces + String(data);
            }

            function switchOutputTab(format) {
                exportData(format);
            }

            function copyOutput() {
                const pre = document.getElementById('outputPre');
                const text = pre.textContent;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).then(() => {
                        toast('Copied to clipboard! 📋');
                    }).catch(() => {
                        fallbackCopy(text);
                    });
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    toast('Copied to clipboard! 📋');
                } catch (e) {
                    toast('Failed to copy ⚠');
                }
                document.body.removeChild(textarea);
            }

            function updateNodeCount() {
                const count = countNodes(masterData);
                document.getElementById('nodeCount').textContent = count;
            }

            // ──────────────────────────────────────
            //  TOAST NOTIFICATIONS
            // ──────────────────────────────────────
            function toast(message) {
                const container = document.getElementById('toastContainer');
                const toastEl = document.createElement('div');
                toastEl.className = 'toast';
                toastEl.textContent = message;
                container.appendChild(toastEl);
                setTimeout(() => {
                    if (toastEl.parentNode) toastEl.parentNode.removeChild(toastEl);
                }, 2400);
            }

            // ──────────────────────────────────────
            //  GLOBAL CLICK TO CLOSE OVERLAYS
            // ──────────────────────────────────────
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('floatingMenu');
                const switcher = document.getElementById('typeSwitcher');
                const isMenuClick = menu.contains(e.target);
                const isSwitcherClick = switcher.contains(e.target);
                const isTriggerClick = e.target.closest('.menu-trigger');
                const isBadgeClick = e.target.closest('.type-badge');

                if (!isMenuClick && !isTriggerClick && menu.style.display !== 'none') {
                    closeFloatingMenu();
                }
                if (!isSwitcherClick && !isBadgeClick && switcher.style.display !== 'none') {
                    closeTypeSwitcher();
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeFloatingMenu();
                    closeTypeSwitcher();
                    clearHighlights();
                    document.getElementById('searchInput').blur();
                }
                if (e.ctrlKey && e.shiftKey && e.key === 'J') {
                    e.preventDefault();
                    exportData('json');
                }
                if (e.ctrlKey && e.shiftKey && e.key === 'Y') {
                    e.preventDefault();
                    exportData('yaml');
                }
                if (e.ctrlKey && e.key === 'f') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });

            // ──────────────────────────────────────
            //  INIT
            // ──────────────────────────────────────
            function init() {
                renderAll();
                exportData('json');
                updateNodeCount();
                expandedPaths.add(pathToKey([]));
                console.log('🌸 PastelTree v2 initialized — with search, drag & drop, ghost nodes, and partial updates!');
                console.log('  Shortcuts: Ctrl+F (search) | Ctrl+Shift+J (JSON) | Ctrl+Shift+Y (YAML) | Esc (close menus)');
                console.log('  Data:', masterData);
                console.log('  Try dragging nodes by the handle (⋮⋮) or clicking the ghost "+" buttons!');
            }

            // Expose to global scope
            window.addRootProperty = addRootProperty;
            window.expandAll = expandAll;
            window.collapseAll = collapseAll;
            window.exportData = exportData;
            window.switchOutputTab = switchOutputTab;
            window.copyOutput = copyOutput;
            window.onSearch = onSearch;

            init();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PastelTree v2 — Visual Data Editor</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1">
    </script>

    <style>
        :root {
            --color-object: #FCE4EC;
            --color-object-border: #F48FB1;
            --color-object-text: #AD1457;
            --color-object-icon: #D81B60;
            --color-array: #F3E5F5;
            --color-array-border: #CE93D8;
            --color-array-text: #6A1B9A;
            --color-array-icon: #8E24AA;
            --color-string: #E3F2FD;
            --color-string-border: #90CAF9;
            --color-string-text: #0D47A1;
            --color-string-icon: #1E88E5;
            --color-number: #FFF8E1;
            --color-number-border: #FFE082;
            --color-number-text: #E65100;
            --color-number-icon: #FB8C00;
            --color-boolean: #E8F5E9;
            --color-boolean-border: #A5D6A7;
            --color-boolean-text: #1B5E20;
            --color-boolean-icon: #43A047;
            --color-null: #F5F5F5;
            --color-null-border: #BDBDBD;
            --color-null-text: #9E9E9E;
            --color-error: #FFEBEE;
            --color-error-border: #EF9A9A;
            --bg-app: #FAF8F9;
            --bg-surface: #FFFFFF;
            --text-primary: #2D2630;
            --text-secondary: #6B5E70;
            --text-muted: #9E8FA0;
            --border-soft: #E8E0E5;
            --shadow-sm: 0 1px 2px rgba(45, 38, 48, 0.04);
            --shadow-md: 0 4px 16px rgba(45, 38, 48, 0.08);
            --shadow-lg: 0 12px 40px rgba(45, 38, 48, 0.14);
            --shadow-glow: 0 0 0 8px rgba(216, 27, 96, 0.06);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 999px;
            --transition-fast: 0.16s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Mono', 'Consolas', 'JetBrains Mono', monospace;
            --indent-width: 28px;
            --line-thickness: 1.5px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-app);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            line-height: 1.5;
            letter-spacing: -0.01em;
        }

        /* ── TOOLBAR ────────────────────────── */
        .toolbar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-soft);
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            min-height: 52px;
        }
        .toolbar-brand {
            display: flex;
            align-items: center;
            gap: 9px;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
            color: #AD1457;
            white-space: nowrap;
            user-select: none;
        }
        .toolbar-brand .logo-icon {
            font-size: 1.5rem;
            color: #D81B60;
            animation: subtlePulse 3s ease-in-out infinite;
        }
        @keyframes subtlePulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }
        .toolbar-spacer {
            flex: 1;
            min-width: 8px;
        }
        .search-wrap {
            position: relative;
            flex: 0 1 240px;
            min-width: 140px;
        }
        .search-wrap input {
            width: 100%;
            padding: 8px 12px 8px 34px;
            border-radius: var(--radius-full);
            border: 1.5px solid var(--border-soft);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            background: #F8F5F7;
            transition: all var(--transition-fast);
            outline: none;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        .search-wrap input:focus {
            background: #fff;
            border-color: #D81B60;
            box-shadow: 0 0 0 4px rgba(216, 27, 96, 0.05);
        }
        .search-wrap input::placeholder {
            color: var(--text-muted);
        }
        .search-wrap .search-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            pointer-events: none;
        }
        .search-results {
            position: absolute;
            top: 100%;
            right: 0;
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 3px 8px;
            display: none;
            white-space: nowrap;
        }
        .search-results.visible {
            display: block;
        }
        .toolbar-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 14px;
            border-radius: var(--radius-full);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all var(--transition-fast);
            white-space: nowrap;
            letter-spacing: -0.01em;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background: transparent;
            color: var(--text-secondary);
        }
        .btn:hover {
            background: #F8F5F7;
            border-color: #D8CFD5;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #D81B60;
            color: #fff;
            border-color: #D81B60;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(216, 27, 96, 0.18);
        }
        .btn-primary:hover {
            background: #C01852;
            border-color: #C01852;
            box-shadow: 0 4px 14px rgba(216, 27, 96, 0.28);
        }
        .btn-sm {
            padding: 6px 10px;
            font-size: 0.78rem;
            gap: 3px;
        }
        .btn-icon {
            padding: 7px;
            border-radius: 50%;
            min-width: 32px;
            justify-content: center;
        }
        .badge-count {
            background: #F3E5F5;
            color: #6A1B9A;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }

        /* ── MAIN LAYOUT ────────────────────── */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .editor-panel {
            flex: 1 1 58%;
            overflow-y: auto;
            overflow-x: auto;
            padding: 16px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-width: 320px;
            scroll-behavior: smooth;
        }
        .editor-panel::-webkit-scrollbar {
            width: 6px;
        }
        .editor-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .editor-panel::-webkit-scrollbar-thumb {
            background: #E0D8DD;
            border-radius: 10px;
        }
        .output-panel {
            flex: 0 1 42%;
            background: var(--bg-surface);
            border-left: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 280px;
            max-width: 520px;
        }
        .output-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-soft);
            gap: 8px;
            flex-wrap: wrap;
        }
        .output-tabs {
            display: flex;
            gap: 2px;
            background: #F3F0F3;
            border-radius: var(--radius-full);
            padding: 3px;
        }
        .output-tab {
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
        }
        .output-tab.active {
            background: #fff;
            color: #AD1457;
            box-shadow: var(--shadow-sm);
            font-weight: 600;
        }
        .output-content {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
            position: relative;
        }
        .output-content pre {
            font-family: var(--font-mono);
            font-size: 0.76rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text-primary);
            margin: 0;
            background: #FAF9FA;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            border: 1px solid var(--border-soft);
            tab-size: 2;
        }
        .copy-btn {
            position: absolute;
            top: 20px;
            right: 22px;
            opacity: 0;
            transition: opacity var(--transition-fast);
            background: #fff;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-full);
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.72rem;
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            z-index: 5;
        }
        .output-content:hover .copy-btn {
            opacity: 1;
        }
        .copy-btn:hover {
            background: #F8F5F7;
            border-color: #D8CFD5;
        }

        /* ── TREE NODES ─────────────────────── */
        .tree-root {
            display: flex;
            flex-direction: column;
            gap: 0;
            width: 100%;
            max-width: 900px;
            position: relative;
        }
        .node-item {
            position: relative;
            animation: nodeAppear 0.22s ease-out;
        }
        @keyframes nodeAppear {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .node-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            border-radius: var(--radius-md);
            cursor: default;
            transition: all var(--transition-fast);
            position: relative;
            min-height: 38px;
            flex-wrap: nowrap;
            background: transparent;
            border: 1.5px solid transparent;
            z-index: 1;
        }
        .node-header:hover {
            background: rgba(255, 255, 255, 0.65);
            border-color: var(--border-soft);
            box-shadow: var(--shadow-sm);
        }
        .node-header.highlight-glow {
            box-shadow: var(--shadow-glow);
            border-color: rgba(216, 27, 96, 0.22);
            z-index: 3;
            background: rgba(255, 255, 255, 0.75);
        }
        .node-header.error-validate {
            background: var(--color-error) !important;
            border-color: var(--color-error-border) !important;
        }
        .node-header.search-match {
            background: rgba(255, 235, 59, 0.18) !important;
            border-color: rgba(251, 192, 45, 0.5) !important;
            box-shadow: 0 0 0 5px rgba(251, 192, 45, 0.1) !important;
            z-index: 4 !important;
        }
        .node-header.drag-over {
            background: rgba(216, 27, 96, 0.06) !important;
            border-color: #D81B60 !important;
            border-style: dashed !important;
            box-shadow: 0 0 0 10px rgba(216, 27, 96, 0.04) !important;
        }
        .node-header.drag-ghost {
            opacity: 0.45;
            background: rgba(255, 255, 255, 0.5) !important;
            pointer-events: none;
        }
        .collapse-toggle {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 6px;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            color: var(--text-muted);
            font-size: 0.78rem;
        }
        .collapse-toggle:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-primary);
        }
        .collapse-toggle i {
            transition: transform var(--transition-smooth);
        }
        .collapse-toggle.collapsed i {
            transform: rotate(-90deg);
        }
        .type-icon {
            font-size: 1.05rem;
            flex-shrink: 0;
            width: 20px;
            text-align: center;
        }
        /* Auto-expanding key input */
        .key-input-wrap {
            position: relative;
            display: inline-flex;
            flex-shrink: 1;
            min-width: 40px;
        }
        .key-input {
            border: none;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
            padding: 3px 7px;
            border-radius: 6px;
            width: 100%;
            min-width: 40px;
            letter-spacing: -0.01em;
            transition: all var(--transition-fast);
            outline: none;
            border: 1.5px solid transparent;
            box-sizing: content-box;
        }
        .key-input:focus {
            background: #fff;
            border-color: #D81B60;
            box-shadow: 0 0 0 3px rgba(216, 27, 96, 0.05);
        }
        .key-input:hover:not(:focus) {
            background: rgba(255, 255, 255, 0.55);
        }
        .type-badge {
            font-size: 0.62rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 3px 8px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            cursor: pointer;
            transition: all var(--transition-fast);
            user-select: none;
            position: relative;
        }
        .type-badge:hover {
            filter: brightness(0.93);
            transform: scale(1.05);
        }
        /* Auto-expanding value editor */
        .value-editor-wrap {
            position: relative;
            display: inline-flex;
            flex-shrink: 1;
            min-width: 40px;
        }
        .value-editor {
            border: 1.5px solid transparent;
            background: rgba(255, 255, 255, 0.45);
            font-family: 'Inter', sans-serif;
            font-size: 0.83rem;
            padding: 4px 9px;
            border-radius: 8px;
            width: 100%;
            min-width: 40px;
            color: var(--text-primary);
            transition: all var(--transition-fast);
            outline: none;
            letter-spacing: -0.01em;
            box-sizing: content-box;
        }
        .value-editor:focus {
            background: #fff;
            border-color: #90CAF9;
            box-shadow: 0 0 0 3px rgba(144, 202, 249, 0.1);
        }
        .boolean-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.45);
            border: 1.5px solid transparent;
            transition: all var(--transition-fast);
            font-weight: 500;
            font-size: 0.78rem;
        }
        .boolean-toggle:hover {
            background: #fff;
            border-color: #A5D6A7;
        }
        .boolean-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            transition: all var(--transition-fast);
        }
        .boolean-dot.true {
            background: #43A047;
            box-shadow: 0 0 7px rgba(67, 160, 71, 0.35);
        }
        .boolean-dot.false {
            background: #BDBDBD;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.06);
        }

        .menu-trigger {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 7px;
            flex-shrink: 0;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            opacity: 0;
            font-size: 0.95rem;
        }
        .node-header:hover .menu-trigger {
            opacity: 1;
        }
        .menu-trigger:hover {
            background: rgba(0, 0, 0, 0.06);
            color: var(--text-primary);
        }
        .menu-trigger.active {
            opacity: 1;
            background: rgba(216, 27, 96, 0.1);
            color: #D81B60;
        }
        .drag-handle {
            width: 8px;
            height: 100%;
            cursor: grab;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity var(--transition-fast);
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            margin-left: -2px;
            margin-right: -2px;
        }
        .node-header:hover .drag-handle {
            opacity: 0.7;
        }
        .drag-handle:active {
            cursor: grabbing;
            opacity: 1;
        }
        .drag-handle i {
            pointer-events: none;
        }

        /* ── CHILDREN CONTAINER ─────────────── */
        .node-children-wrap {
            overflow: hidden;
            transition: max-height var(--transition-smooth), opacity var(--transition-smooth);
            max-height: 8000px;
            opacity: 1;
        }
        .node-children-wrap.collapsed {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }
        .node-children {
            margin-left: var(--indent-width);
            padding-left: 14px;
            border-left: var(--line-thickness) dashed var(--branch-color, #D8CFD5);
            position: relative;
        }
        .node-children>.node-item::before {
            content: '';
            position: absolute;
            left: -14px;
            top: 18px;
            width: 14px;
            height: var(--line-thickness);
            background: var(--branch-color, #D8CFD5);
            border-radius: 0;
        }

        /* Ghost addition node */
        .ghost-node {
            opacity: 0.35;
            transition: all var(--transition-fast);
            cursor: pointer;
            border-radius: var(--radius-md);
            padding: 4px 10px;
            margin-left: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            color: var(--text-muted);
            font-style: italic;
            user-select: none;
            border: 1.5px dashed transparent;
            min-height: 32px;
        }
        .ghost-node:hover {
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.6);
            border-color: var(--border-soft);
            color: var(--text-primary);
            font-style: normal;
            box-shadow: var(--shadow-sm);
        }
        .ghost-node i {
            font-size: 0.85rem;
        }

        /* ── FLOATING MENU ──────────────────── */
        .floating-menu {
            position: fixed;
            z-index: 999;
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-soft);
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 170px;
            animation: menuPop 0.18s ease-out;
            pointer-events: auto;
        }
        @keyframes menuPop {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(-4px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .floating-menu-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 13px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.81rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
            text-align: left;
            width: 100%;
        }
        .floating-menu-item:hover {
            background: #F8F5F7;
        }
        .floating-menu-item.danger {
            color: #C62828;
        }
        .floating-menu-item.danger:hover {
            background: #FFEBEE;
        }
        .floating-menu-divider {
            height: 1px;
            background: var(--border-soft);
            margin: 3px 8px;
        }

        /* ── TYPE SWITCHER ──────────────────── */
        .type-switcher-dropdown {
            position: fixed;
            z-index: 999;
            background: #fff;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-soft);
            padding: 4px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 140px;
            animation: menuPop 0.16s ease-out;
        }
        .type-switcher-dropdown button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 11px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.79rem;
            font-weight: 500;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all var(--transition-fast);
            text-align: left;
        }
        .type-switcher-dropdown button:hover {
            background: #F8F5F7;
        }
        .type-switcher-dropdown .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── TOAST ──────────────────────────── */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 7px;
            pointer-events: none;
        }
        .toast {
            background: #2D2630;
            color: #fff;
            padding: 10px 18px;
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.28s ease-out, toastOut 0.28s ease-out 2s forwards;
            pointer-events: auto;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(16px);
            }
        }

        /* ── EMPTY STATE ────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            color: var(--text-muted);
            text-align: center;
            gap: 6px;
        }
        .empty-state i {
            font-size: 2.2rem;
            opacity: 0.45;
        }

        /* ── RESPONSIVE ─────────────────────── */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            .output-panel {
                flex: 0 0 auto;
                max-height: 38vh;
                border-left: none;
                border-top: 1px solid var(--border-soft);
                min-width: 100%;
                max-width: 100%;
            }
            .editor-panel {
                padding: 10px 8px 50px;
                min-width: 100%;
            }
            .toolbar {
                padding: 8px 12px;
                gap: 6px;
            }
            .toolbar-brand {
                font-size: 1rem;
            }
            .search-wrap {
                flex: 1 1 120px;
                min-width: 100px;
            }
            .btn {
                padding: 6px 10px;
                font-size: 0.74rem;
            }
            .key-input {
                font-size: 0.78rem;
                min-width: 30px;
            }
            .value-editor {
                font-size: 0.76rem;
                min-width: 30px;
            }
            .node-header {
                gap: 3px;
                padding: 4px 5px;
                min-height: 34px;
            }
            .node-children {
                margin-left: 16px;
                padding-left: 8px;
            }
            .node-children>.node-item::before {
                left: -8px;
                width: 8px;
            }
            :root {
                --indent-width: 16px;
            }
            .menu-trigger {
                opacity: 1;
                width: 22px;
                height: 22px;
            }
            .drag-handle {
                opacity: 0.5;
            }
            .ghost-node {
                font-size: 0.72rem;
                padding: 3px 7px;
                min-height: 28px;
            }
        }
        @media (max-width: 480px) {
            html {
                font-size: 13px;
            }
            .toolbar-actions {
                gap: 3px;
            }
            .btn {
                padding: 5px 8px;
                font-size: 0.7rem;
                gap: 2px;
            }
            .btn-sm {
                padding: 4px 7px;
            }
            .key-input {
                max-width: 80px;
                font-size: 0.74rem;
            }
            .value-editor {
                max-width: 100px;
                font-size: 0.72rem;
            }
            .output-panel {
                max-height: 32vh;
            }
            .floating-menu {
                min-width: 140px;
            }
            .floating-menu-item {
                padding: 7px 9px;
                font-size: 0.74rem;
                gap: 6px;
            }
            .ghost-node {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- ═══════════ TOOLBAR ═══════════════════ -->
    <header class="toolbar">
        <div class="toolbar-brand">
            <i class="ph ph-tree-structure logo-icon"></i>
            <span>PastelTree<span style="font-weight:400;font-size:0.75rem;color:var(--text-muted);">v2</span></span>
        </div>
        <div class="search-wrap">
            <i class="ph ph-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search keys & values…" oninput="onSearch(this.value)">
            <span class="search-results" id="searchResults">0 matches</span>
        </div>
        <div class="toolbar-spacer"></div>
        <div class="toolbar-actions">
            <button class="btn btn-sm" onclick="addRootProperty()" title="Add root property">
                <i class="ph ph-plus-circle"></i> Add Root
            </button>
            <button class="btn btn-sm" onclick="expandAll()" title="Expand all nodes">
                <i class="ph ph-arrows-out"></i> Expand
            </button>
            <button class="btn btn-sm" onclick="collapseAll()" title="Collapse all nodes">
                <i class="ph ph-arrows-in"></i> Collapse
            </button>
            <span style="color:var(--text-muted);font-size:0.7rem;display:flex;align-items:center;gap:4px;">
                <span class="badge-count" id="nodeCount">0</span> nodes
            </span>
            <button class="btn btn-primary btn-sm" onclick="exportData('json')">
                <i class="ph ph-brackets-curly"></i> JSON
            </button>
            <button class="btn btn-sm" onclick="exportData('yaml')">
                <i class="ph ph-text-align-left"></i> YAML
            </button>
        </div>
    </header>

    <!-- ═══════════ MAIN LAYOUT ═══════════════ -->
    <div class="main-container">
        <!-- Editor Panel -->
        <div class="editor-panel" id="editorPanel">
            <div class="tree-root" id="treeRoot">
                <!-- Recursive rendering goes here -->
            </div>
        </div>

        <!-- Output Panel -->
        <div class="output-panel" id="outputPanel">
            <div class="output-panel-header">
                <span style="font-weight:600;font-size:0.85rem;color:var(--text-secondary);">Output Preview</span>
                <div class="output-tabs">
                    <button class="output-tab active" data-format="json" onclick="switchOutputTab('json')">JSON</button>
                    <button class="output-tab" data-format="yaml" onclick="switchOutputTab('yaml')">YAML</button>
                </div>
            </div>
            <div class="output-content" id="outputContent">
                <pre id="outputPre">// Click JSON or YAML to generate</pre>
                <button class="copy-btn" id="copyBtn" onclick="copyOutput()" title="Copy to clipboard">
                    <i class="ph ph-copy"></i> Copy
                </button>
            </div>
        </div>
    </div>

    <!-- Floating Menu (portal) -->
    <div class="floating-menu" id="floatingMenu" style="display:none;"></div>

    <!-- Type Switcher Dropdown (portal) -->
    <div class="type-switcher-dropdown" id="typeSwitcher" style="display:none;"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // ──────────────────────────────────────
            //  STATE MANAGEMENT
            // ──────────────────────────────────────
            const masterData = {
                "project": "PastelTree v2",
                "version": 2.0,
                "active": true,
                "tags,category": ["editor", "json", "pastel", "visual-tool"],
                "config": {
                    "theme": "soft-rose",
                    "autoSave": false,
                    "maxDepth": 10,
                    "palette": {
                        "object": "#FCE4EC",
                        "array": "#F3E5F5",
                        "string": "#E3F2FD",
                        "number": "#FFF8E1",
                        "boolean": "#E8F5E9"
                    }
                },
                "author": {
                    "name": "RaaRion.",
                    "country": null,
                    "yearsActive": 4,
                    "expertise": ["design", "engineering", "ux-research"],
                    "social_links": {
                        "github": "https://github.com/dazep01",
                        "instagram": "https://instagram.com/debara97"
                    }
                },
                "metadata": {
                    "long_description": "A visual data editor with pastel aesthetics & smart interactions for modern development workflows."
                }
            };

            // robust path: use JSON.stringify as key
            function pathToKey(pathArr) {
                return JSON.stringify(pathArr);
            }

            function keyToPath(key) {
                try {
                    return JSON.parse(key);
                } catch (e) {
                    return [];
                }
            }

            let expandedPaths = new Set();
            // Initialize expanded paths
            expandedPaths.add(pathToKey([]));
            expandedPaths.add(pathToKey(['config']));
            expandedPaths.add(pathToKey(['config', 'palette']));
            expandedPaths.add(pathToKey(['author']));
            expandedPaths.add(pathToKey(['author', 'social_links']));
            expandedPaths.add(pathToKey(['tags,category']));
            expandedPaths.add(pathToKey(['metadata']));

            let currentOutputFormat = 'json';
            let activeMenuPathKey = null;
            let activeTypeSwitcherPathKey = null;
            let searchTerm = '';
            let searchMatchPaths = new Set(); // Set of pathKeys that match search
            let dragSourcePath = null;
            let dragSourceKey = null;

            // Node counter
            function countNodes(data) {
                let count = 1;
                const type = getType(data);
                if (type === 'object' && data !== null) {
                    Object.values(data).forEach(v => count += countNodes(v));
                } else if (type === 'array') {
                    data.forEach(v => count += countNodes(v));
                }
                return count;
            }

            // ──────────────────────────────────────
            //  PATH UTILITIES
            // ──────────────────────────────────────
            function getByPath(obj, pathArr) {
                let curr = obj;
                for (const k of pathArr) {
                    if (curr === null || curr === undefined || typeof curr !== 'object') return undefined;
                    curr = curr[k];
                }
                return curr;
            }

            function setByPath(obj, pathArr, value) {
                if (pathArr.length === 0) return;
                let curr = obj;
                for (let i = 0; i < pathArr.length - 1; i++) {
                    if (!(pathArr[i] in curr) || typeof curr[pathArr[i]] !== 'object' || curr[pathArr[i]] === null) {
                        curr[pathArr[i]] = {};
                    }
                    curr = curr[pathArr[i]];
                }
                curr[pathArr[pathArr.length - 1]] = value;
            }

            function deleteByPath(obj, pathArr) {
                if (pathArr.length === 0) return;
                let curr = obj;
                for (let i = 0; i < pathArr.length - 1; i++) {
                    if (!(pathArr[i] in curr)) return;
                    curr = curr[pathArr[i]];
                }
                const lastKey = pathArr[pathArr.length - 1];
                if (Array.isArray(curr)) {
                    curr.splice(parseInt(lastKey), 1);
                } else {
                    delete curr[lastKey];
                }
            }

            function getParentPath(pathArr) {
                return pathArr.slice(0, -1);
            }

            function getLastKey(pathArr) {
                return pathArr[pathArr.length - 1];
            }

            // ──────────────────────────────────────
            //  TYPE DETECTION & COLOR MAPPING
            // ──────────────────────────────────────
            function getType(value) {
                if (value === null || value === undefined) return 'null';
                if (Array.isArray(value)) return 'array';
                if (typeof value === 'object') return 'object';
                if (typeof value === 'boolean') return 'boolean';
                if (typeof value === 'number') return 'number';
                if (typeof value === 'string') return 'string';
                return 'string';
            }

            function getTypeColor(type) {
                const map = {
                    'object': 'var(--color-object)',
                    'array': 'var(--color-array)',
                    'string': 'var(--color-string)',
                    'number': 'var(--color-number)',
                    'boolean': 'var(--color-boolean)',
                    'null': 'var(--color-null)',
                };
                return map[type] || 'var(--color-null)';
            }

            function getTypeBorderColor(type) {
                const map = {
                    'object': 'var(--color-object-border)',
                    'array': 'var(--color-array-border)',
                    'string': 'var(--color-string-border)',
                    'number': 'var(--color-number-border)',
                    'boolean': 'var(--color-boolean-border)',
                    'null': 'var(--color-null-border)',
                };
                return map[type] || 'var(--color-null-border)';
            }

            function getTypeTextColor(type) {
                const map = {
                    'object': 'var(--color-object-text)',
                    'array': 'var(--color-array-text)',
                    'string': 'var(--color-string-text)',
                    'number': 'var(--color-number-text)',
                    'boolean': 'var(--color-boolean-text)',
                    'null': 'var(--color-null-text)',
                };
                return map[type] || 'var(--color-null-text)';
            }

            function getTypeIcon(type) {
                const map = {
                    'object': 'ph-brackets-curly',
                    'array': 'ph-brackets-square',
                    'string': 'ph-text-aa',
                    'number': 'ph-hash',
                    'boolean': 'ph-toggle-right',
                    'null': 'ph-prohibit',
                };
                return map[type] || 'ph-question';
            }

            function getDefaultValueForType(type) {
                switch (type) {
                    case 'object':
                        return {};
                    case 'array':
                        return [];
                    case 'string':
                        return '';
                    case 'number':
                        return 0;
                    case 'boolean':
                        return false;
                    case 'null':
                        return null;
                    default:
                        return '';
                }
            }

            // ──────────────────────────────────────
            //  RENDER ENGINE (Full & Partial)
            // ──────────────────────────────────────
            function renderAll() {
                const container = document.getElementById('treeRoot');
                container.innerHTML = '';
                renderNode(masterData, container, [], '(root)');
                closeFloatingMenu();
                closeTypeSwitcher();
                updateNodeCount();
                applySearchHighlights();
            }

            function renderNode(data, container, pathArr, keyName) {
                const type = getType(data);
                const isCollapsible = (type === 'object' || type === 'array');
                const childKeys = isCollapsible ? (Array.isArray(data) ? data.map((_, i) => String(i)) : Object.keys(
                    data)) : [];
                const hasChildren = isCollapsible && childKeys.length > 0;
                const pathKey = pathToKey(pathArr);
                const isExpanded = expandedPaths.has(pathKey);
                const parentType = pathArr.length > 0 ? getType(getByPath(masterData, getParentPath(pathArr))) :
                'object';
                const branchColor = `var(--color-${parentType}-border)`;

                const nodeItem = document.createElement('div');
                nodeItem.className = 'node-item';
                nodeItem.setAttribute('data-path-key', pathKey);
                nodeItem.style.setProperty('--branch-color', branchColor);
                nodeItem.draggable = false;

                // Header
                const header = document.createElement('div');
                header.className = 'node-header';
                header.setAttribute('data-path-key', pathKey);
                header.draggable = false;

                // Drag handle
                if (pathArr.length > 0) {
                    const dragHandle = document.createElement('span');
                    dragHandle.className = 'drag-handle';
                    dragHandle.innerHTML = '<i class="ph ph-dots-six-vertical"></i>';
                    dragHandle.setAttribute('draggable', 'true');
                    dragHandle.addEventListener('dragstart', (e) => onDragStart(e, pathArr));
                    dragHandle.addEventListener('dragend', (e) => onDragEnd(e));
                    header.appendChild(dragHandle);
                } else {
                    const spacer = document.createElement('span');
                    spacer.style.width = '8px';
                    spacer.style.flexShrink = '0';
                    header.appendChild(spacer);
                }

                // Collapse toggle
                const collapseToggle = document.createElement('span');
                collapseToggle.className = 'collapse-toggle' + (isExpanded ? '' : ' collapsed');
                if (isCollapsible && hasChildren) {
                    collapseToggle.innerHTML = '<i class="ph ph-caret-right"></i>';
                    collapseToggle.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleCollapse(pathKey);
                    });
                } else if (isCollapsible && !hasChildren) {
                    collapseToggle.innerHTML = '<i class="ph ph-caret-right" style="opacity:0.25;"></i>';
                    collapseToggle.style.cursor = 'default';
                } else {
                    collapseToggle.innerHTML = '<span style="width:8px;display:inline-block;"></span>';
                    collapseToggle.style.cursor = 'default';
                }
                header.appendChild(collapseToggle);

                // Type icon
                const typeIcon = document.createElement('span');
                typeIcon.className = 'type-icon';
                typeIcon.innerHTML = `<i class="ph ${getTypeIcon(type)}" style="color:${getTypeTextColor(type)};"></i>`;
                header.appendChild(typeIcon);

                // Key input (auto-expanding)
                const keyInputWrap = document.createElement('span');
                keyInputWrap.className = 'key-input-wrap';
                const keyInput = document.createElement('input');
                keyInput.className = 'key-input';
                keyInput.value = keyName;
                keyInput.setAttribute('data-path-key', pathKey);
                keyInput.setAttribute('data-field', 'key');
                keyInput.setAttribute('size', '1');
                keyInput.addEventListener('input', (e) => {
                    autoSizeInput(keyInput);
                    onKeyChange(pathArr, e.target.value, keyInput);
                });
                keyInput.addEventListener('focus', () => {
                    highlightAncestors(pathArr);
                });
                keyInput.addEventListener('blur', () => {
                    clearHighlights();
                });
                keyInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') e.target.blur();
                });
                // Initial size
                keyInputWrap.appendChild(keyInput);
                header.appendChild(keyInputWrap);
                // Auto-size after append
                requestAnimationFrame(() => autoSizeInput(keyInput));

                // Type badge
                const typeBadge = document.createElement('span');
                typeBadge.className = 'type-badge';
                typeBadge.textContent = type;
                typeBadge.style.background = getTypeColor(type);
                typeBadge.style.color = getTypeTextColor(type);
                typeBadge.style.border = `1px solid ${getTypeBorderColor(type)}`;
                typeBadge.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openTypeSwitcher(e, pathArr, typeBadge);
                });
                header.appendChild(typeBadge);

                // Value editor for primitives
                if (!isCollapsible) {
                    if (type === 'boolean') {
                        const boolToggle = document.createElement('span');
                        boolToggle.className = 'boolean-toggle';
                        boolToggle.setAttribute('data-path-key', pathKey);
                        boolToggle.innerHTML = `
                  <span class="boolean-dot ${data ? 'true' : 'false'}"></span>
                  <span>${data ? 'true' : 'false'}</span>
                `;
                        boolToggle.addEventListener('click', (e) => {
                            e.stopPropagation();
                            setByPath(masterData, pathArr, !data);
                            updateNodeValue(pathArr, !data);
                            updateOutput();
                            toast('Boolean toggled ✓');
                        });
                        header.appendChild(boolToggle);
                    } else if (type === 'null') {
                        const nullSpan = document.createElement('span');
                        nullSpan.className = 'value-editor';
                        nullSpan.textContent = 'null';
                        nullSpan.style.color = 'var(--text-muted)';
                        nullSpan.style.fontStyle = 'italic';
                        nullSpan.setAttribute('data-path-key', pathKey);
                        header.appendChild(nullSpan);
                    } else {
                        const valueWrap = document.createElement('span');
                        valueWrap.className = 'value-editor-wrap';
                        const valueInput = document.createElement('input');
                        valueInput.className = 'value-editor';
                        valueInput.value = type === 'number' ? data : String(data);
                        valueInput.setAttribute('data-path-key', pathKey);
                        valueInput.setAttribute('data-field', 'value');
                        valueInput.setAttribute('data-type', type);
                        valueInput.setAttribute('size', '1');
                        if (type === 'number') {
                            valueInput.type = 'number';
                            valueInput.step = 'any';
                        }
                        valueInput.addEventListener('input', (e) => {
                            autoSizeInput(valueInput);
                            onValueChange(pathArr, e.target.value, type, valueInput);
                        });
                        valueInput.addEventListener('focus', () => {
                            highlightAncestors(pathArr);
                        });
                        valueInput.addEventListener('blur', () => {
                            clearHighlights();
                            validateValueInput(valueInput, type);
                        });
                        valueInput.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') e.target.blur();
                        });
                        valueWrap.appendChild(valueInput);
                        header.appendChild(valueWrap);
                        requestAnimationFrame(() => autoSizeInput(valueInput));
                    }
                } else {
                    const countSpan = document.createElement('span');
                    countSpan.className = 'type-badge';
                    countSpan.textContent = `${childKeys.length} item${childKeys.length !== 1 ? 's' : ''}`;
                    countSpan.style.background = 'transparent';
                    countSpan.style.color = 'var(--text-muted)';
                    countSpan.style.border = '1px dashed var(--border-soft)';
                    countSpan.style.fontWeight = '400';
                    header.appendChild(countSpan);
                }

                // Menu trigger
                const menuTrigger = document.createElement('span');
                menuTrigger.className = 'menu-trigger';
                menuTrigger.innerHTML = '<i class="ph ph-dots-three-vertical"></i>';
                menuTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openFloatingMenu(e, pathArr, menuTrigger);
                });
                header.appendChild(menuTrigger);

                // Hover highlight
                header.addEventListener('mouseenter', () => highlightAncestors(pathArr));
                header.addEventListener('mouseleave', clearHighlights);

                // Drag and drop event listeners on header
                header.addEventListener('dragover', (e) => onDragOver(e, pathArr, header));
                header.addEventListener('dragleave', (e) => onDragLeave(e, header));
                header.addEventListener('drop', (e) => onDrop(e, pathArr, header));

                nodeItem.appendChild(header);

                // Children
                if (isCollapsible) {
                    const childrenWrap = document.createElement('div');
                    childrenWrap.className = 'node-children-wrap' + (isExpanded ? '' : ' collapsed');
                    childrenWrap.setAttribute('data-path-key', pathKey + '-children');
                    const childrenContainer = document.createElement('div');
                    childrenContainer.className = 'node-children';
                    childrenContainer.style.setProperty('--branch-color', `var(--color-${type}-border)`);

                    if (Array.isArray(data)) {
                        data.forEach((item, index) => {
                            renderNode(item, childrenContainer, [...pathArr, String(index)],
                                String(index));
                        });
                    } else {
                        Object.keys(data).forEach(key => {
                            renderNode(data[key], childrenContainer, [...pathArr, key], key);
                        });
                    }

                    // Ghost addition node
                    const ghostNode = document.createElement('div');
                    ghostNode.className = 'ghost-node';
                    ghostNode.innerHTML =
                        `<i class="ph ph-plus-circle"></i> Add ${type === 'array' ? 'item' : 'property'}…`;
                    ghostNode.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (type === 'array') {
                            addItemToArray(pathArr);
                        } else {
                            addChildToNode(pathArr, type);
                        }
                    });
                    childrenContainer.appendChild(ghostNode);

                    childrenWrap.appendChild(childrenContainer);
                    nodeItem.appendChild(childrenWrap);
                }

                container.appendChild(nodeItem);
            }

            // ──────────────────────────────────────
            //  PARTIAL UPDATE (Optimized)
            // ──────────────────────────────────────
            function updateNodeValue(pathArr, newValue) {
                const pathKey = pathToKey(pathArr);
                const type = getType(newValue);
                // Update boolean toggle if present
                const boolToggle = document.querySelector(`.boolean-toggle[data-path-key="${CSS.escape(pathKey)}"]`);
                if (boolToggle && type === 'boolean') {
                    boolToggle.innerHTML = `
                <span class="boolean-dot ${newValue ? 'true' : 'false'}"></span>
                <span>${newValue ? 'true' : 'false'}</span>
              `;
                    return;
                }
                // Update value editor if present
                const valueInput = document.querySelector(`.value-editor[data-path-key="${CSS.escape(pathKey)}"]`);
                if (valueInput && type !== 'boolean' && type !== 'null') {
                    if (document.activeElement !== valueInput) {
                        valueInput.value = type === 'number' ? newValue : String(newValue);
                        autoSizeInput(valueInput);
                    }
                }
                // Update type badge and icon if type changed
                const badge = document.querySelector(
                    `.node-header[data-path-key="${CSS.escape(pathKey)}"] .type-badge`);
                if (badge) {
                    badge.textContent = type;
                    badge.style.background = getTypeColor(type);
                    badge.style.color = getTypeTextColor(type);
                    badge.style.border = `1px solid ${getTypeBorderColor(type)}`;
                }
                const iconEl = document.querySelector(
                    `.node-header[data-path-key="${CSS.escape(pathKey)}"] .type-icon i`);
                if (iconEl) {
                    iconEl.className = `ph ${getTypeIcon(type)}`;
                    iconEl.style.color = getTypeTextColor(type);
                }
            }

            // ──────────────────────────────────────
            //  COLLAPSE / EXPAND
            // ──────────────────────────────────────
            function toggleCollapse(pathKey) {
                if (expandedPaths.has(pathKey)) {
                    expandedPaths.delete(pathKey);
                } else {
                    expandedPaths.add(pathKey);
                }
                // Partial update: just toggle the wrap
                const childrenWrap = document.querySelector(`.node-children-wrap[data-path-key="${CSS.escape(pathKey + '-children')}"]`);
                const toggleBtn = document.querySelector(`.collapse-toggle[data-path-key]`);
                // Actually we need to find the toggle in the right header
                const header = document.querySelector(`.node-header[data-path-key="${CSS.escape(pathKey)}"]`);
                if (header) {
                    const toggle = header.querySelector('.collapse-toggle');
                    if (toggle) {
                        if (expandedPaths.has(pathKey)) {
                            toggle.classList.remove('collapsed');
                        } else {
                            toggle.classList.add('collapsed');
                        }
                    }
                }
                if (childrenWrap) {
                    if (expandedPaths.has(pathKey)) {
                        childrenWrap.classList.remove('collapsed');
                    } else {
                        childrenWrap.classList.add('collapsed');
                    }
                }
                updateOutput();
            }

            function expandAll() {
                const allPaths = collectAllPathKeys(masterData, []);
                allPaths.forEach(p => expandedPaths.add(p));
                renderAll();
                updateOutput();
                toast('All nodes expanded 🌸');
            }

            function collapseAll() {
                expandedPaths.clear();
                expandedPaths.add(pathToKey([]));
                renderAll();
                updateOutput();
                toast('All nodes collapsed');
            }

            function collectAllPathKeys(data, currentPath) {
                const keys = [pathToKey(currentPath)];
                const type = getType(data);
                if (type === 'object' && data !== null) {
                    Object.keys(data).forEach(k => {
                        keys.push(...collectAllPathKeys(data[k], [...currentPath, k]));
                    });
                } else if (type === 'array') {
                    data.forEach((item, i) => {
                        keys.push(...collectAllPathKeys(item, [...currentPath, String(i)]));
                    });
                }
                return keys;
            }

            // ──────────────────────────────────────
            //  AUTO-SIZE INPUT
            // ──────────────────────────────────────
            function autoSizeInput(input) {
                const val = input.value || input.placeholder || '';
                // Estimate width based on character count
                const charWidth = 8.5; // approximate px per character for Inter at 0.85rem
                const minWidth = 40;
                const maxWidth = 350;
                const calculatedWidth = Math.max(minWidth, Math.min(maxWidth, val.length * charWidth + 20));
                input.style.width = calculatedWidth + 'px';
            }

            // ──────────────────────────────────────
            //  EDIT HANDLERS
            // ──────────────────────────────────────
            function onKeyChange(pathArr, newKey, inputElement) {
                const parentPath = getParentPath(pathArr);
                const oldKey = getLastKey(pathArr);
                const parent = parentPath.length > 0 ? getByPath(masterData, parentPath) : masterData;

                if (newKey === oldKey) return;
                if (newKey.trim() === '') return;

                if (!Array.isArray(parent) && typeof parent === 'object' && parent !== null) {
                    if (newKey in parent && newKey !== oldKey) {
                        inputElement.style.borderColor = '#EF9A9A';
                        inputElement.style.background = '#FFEBEE';
                        setTimeout(() => {
                            inputElement.style.borderColor = '';
                            inputElement.style.background = '';
                            inputElement.value = oldKey;
                            autoSizeInput(inputElement);
                        }, 600);
                        toast('⚠ Key already exists');
                        return;
                    }
                }

                if (Array.isArray(parent)) {
                    inputElement.value = oldKey;
                    autoSizeInput(inputElement);
                    return;
                }

                const value = parent[oldKey];
                delete parent[oldKey];
                parent[newKey] = value;

                // Update expanded paths
                const oldPathKey = pathToKey(pathArr);
                const newPathArr = [...parentPath, newKey];
                const newPathKey = pathToKey(newPathArr);
                if (expandedPaths.has(oldPathKey)) {
                    expandedPaths.delete(oldPathKey);
                    expandedPaths.add(newPathKey);
                }
                const toUpdate = [];
                expandedPaths.forEach(pk => {
                    const p = keyToPath(pk);
                    if (p.length >= pathArr.length && arraysEqual(p.slice(0, pathArr.length), pathArr)) {
                        toUpdate.push(pk);
                    }
                });
                toUpdate.forEach(pk => {
                    expandedPaths.delete(pk);
                    const p = keyToPath(pk);
                    const updatedPath = [...newPathArr, ...p.slice(pathArr.length)];
                    expandedPaths.add(pathToKey(updatedPath));
                });

                renderAll();
                updateOutput();
            }

            function arraysEqual(a, b) {
                if (a.length !== b.length) return false;
                for (let i = 0; i < a.length; i++) {
                    if (a[i] !== b[i]) return false;
                }
                return true;
            }

            function onValueChange(pathArr, rawValue, type, inputElement) {
                let parsedValue;
                if (type === 'number') {
                    const num = parseFloat(rawValue);
                    if (isNaN(num) || rawValue.trim() === '' || rawValue === '-') {
                        inputElement.classList.add('error-validate');
                        inputElement.style.background = 'var(--color-error)';
                        inputElement.style.borderColor = 'var(--color-error-border)';
                        return;
                    } else {
                        inputElement.classList.remove('error-validate');
                        inputElement.style.background = '';
                        inputElement.style.borderColor = '';
                        parsedValue = num;
                    }
                } else if (type === 'string') {
                    parsedValue = rawValue;
                } else {
                    parsedValue = rawValue;
                }
                setByPath(masterData, pathArr, parsedValue);
                updateOutput();
            }

            function validateValueInput(inputElement, type) {
                if (type === 'number') {
                    const raw = inputElement.value;
                    const num = parseFloat(raw);
                    if (isNaN(num) || raw.trim() === '' || raw === '-') {
                        inputElement.classList.add('error-validate');
                        inputElement.style.background = 'var(--color-error)';
                        inputElement.style.borderColor = 'var(--color-error-border)';
                    } else {
                        inputElement.classList.remove('error-validate');
                        inputElement.style.background = '';
                        inputElement.style.borderColor = '';
                    }
                }
            }

            // ──────────────────────────────────────
            //  HIGHLIGHT ANCESTORS
            // ──────────────────────────────────────
            function highlightAncestors(pathArr) {
                clearHighlights();
                for (let i = 0; i <= pathArr.length; i++) {
                    const ancestorKey = pathToKey(pathArr.slice(0, i));
                    const header = document.querySelector(`.node-header[data-path-key="${CSS.escape(ancestorKey)}"]`);
                    if (header && !header.classList.contains('search-match')) {
                        header.classList.add('highlight-glow');
                    }
                }
            }

            function clearHighlights() {
                document.querySelectorAll('.node-header.highlight-glow').forEach(el => {
                    el.classList.remove('highlight-glow');
                });
            }

            // ──────────────────────────────────────
            //  SEARCH & FILTER
            // ──────────────────────────────────────
            function onSearch(term) {
                searchTerm = term.trim().toLowerCase();
                searchMatchPaths.clear();
                if (searchTerm.length > 0) {
                    searchInData(masterData, [], searchTerm);
                }
                applySearchHighlights();
                updateSearchResults();
                // Expand all matching paths
                if (searchTerm.length > 0) {
                    searchMatchPaths.forEach(pk => {
                        // expand all ancestors
                        const p = keyToPath(pk);
                        for (let i = 0; i <= p.length; i++) {
                            expandedPaths.add(pathToKey(p.slice(0, i)));
                        }
                    });
                    // Re-render to show expanded nodes
                    renderAll();
                    applySearchHighlights();
                }
            }

            function searchInData(data, pathArr, term) {
                const type = getType(data);
                const pk = pathToKey(pathArr);

                // Search in key
                const lastKey = getLastKey(pathArr);
                if (lastKey && String(lastKey).toLowerCase().includes(term)) {
                    searchMatchPaths.add(pk);
                }

                // Search in value for primitives
                if (type === 'string' && String(data).toLowerCase().includes(term)) {
                    searchMatchPaths.add(pk);
                } else if (type === 'number' && String(data).includes(term)) {
                    searchMatchPaths.add(pk);
                } else if (type === 'boolean' && String(data).includes(term)) {
                    searchMatchPaths.add(pk);
                }

                // Recurse
                if (type === 'object' && data !== null) {
                    Object.keys(data).forEach(k => searchInData(data[k], [...pathArr, k], term));
                } else if (type === 'array') {
                    data.forEach((item, i) => searchInData(item, [...pathArr, String(i)], term));
                }
            }

            function applySearchHighlights() {
                document.querySelectorAll('.node-header.search-match').forEach(el => el.classList.remove(
                'search-match'));
                if (searchTerm.length > 0) {
                    searchMatchPaths.forEach(pk => {
                        const header = document.querySelector(`.node-header[data-path-key="${CSS.escape(pk)}"]`);
                        if (header) {
                            header.classList.add('search-match');
                        }
                    });
                }
            }

            function updateSearchResults() {
                const resultsEl = document.getElementById('searchResults');
                if (searchTerm.length > 0) {
                    resultsEl.textContent = `${searchMatchPaths.size} match${searchMatchPaths.size !== 1 ? 'es' : ''}`;
                    resultsEl.classList.add('visible');
                } else {
                    resultsEl.classList.remove('visible');
                }
            }

            // ──────────────────────────────────────
            //  DRAG AND DROP
            // ──────────────────────────────────────
            function onDragStart(e, pathArr) {
                if (pathArr.length === 0) {
                    e.preventDefault();
                    return;
                }
                dragSourcePath = pathArr;
                dragSourceKey = pathToKey(pathArr);
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', dragSourceKey);
                // Add ghost class
                const header = document.querySelector(`.node-header[data-path-key="${CSS.escape(dragSourceKey)}"]`);
                if (header) header.classList.add('drag-ghost');
                setTimeout(() => {
                    if (header) header.classList.add('drag-ghost');
                }, 0);
            }

            function onDragEnd(e) {
                // Clean up
                document.querySelectorAll('.drag-ghost').forEach(el => el.classList.remove('drag-ghost'));
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                dragSourcePath = null;
                dragSourceKey = null;
            }

            function onDragOver(e, targetPathArr, header) {
                e.preventDefault();
                if (!dragSourcePath) return;
                // Prevent dropping on itself or descendants
                const targetKey = pathToKey(targetPathArr);
                if (targetKey === dragSourceKey) return;
                if (targetKey.startsWith(dragSourceKey + ',')) return;
                // Prevent dropping on root
                e.dataTransfer.dropEffect = 'move';
                header.classList.add('drag-over');
            }

            function onDragLeave(e, header) {
                header.classList.remove('drag-over');
            }

            function onDrop(e, targetPathArr, header) {
                e.preventDefault();
                header.classList.remove('drag-over');
                if (!dragSourcePath) return;
                const targetKey = pathToKey(targetPathArr);
                if (targetKey === dragSourceKey) return;
                if (targetKey.startsWith(dragSourceKey + ',')) return;

                // Perform move
                const sourceData = getByPath(masterData, dragSourcePath);
                const sourceParentPath = getParentPath(dragSourcePath);
                const sourceKey = getLastKey(dragSourcePath);

                // Get target data to check type
                const targetData = getByPath(masterData, targetPathArr);
                const targetType = getType(targetData);

                // Remove from source
                deleteByPath(masterData, dragSourcePath);

                // Add to target
                if (targetType === 'object' && !Array.isArray(targetData)) {
                    let newKey = typeof sourceKey === 'string' ? sourceKey : 'moved';
                    let counter = 1;
                    const targetObj = getByPath(masterData, targetPathArr);
                    while (newKey in targetObj) {
                        newKey = sourceKey + '_' + counter;
                        counter++;
                    }
                    setByPath(masterData, [...targetPathArr, newKey], sourceData);
                } else if (targetType === 'array') {
                    const targetArr = getByPath(masterData, targetPathArr);
                    targetArr.push(sourceData);
                } else {
                    // Target is primitive — wrap in object?
                    // For simplicity, convert target to object
                    const parentPath = getParentPath(targetPathArr);
                    const parentKey = getLastKey(targetPathArr);
                    const parent = parentPath.length > 0 ? getByPath(masterData, parentPath) : masterData;
                    const newObj = {};
                    let newKey = typeof sourceKey === 'string' ? sourceKey : 'moved';
                    newObj[newKey] = sourceData;
                    newObj['_original'] = targetData;
                    parent[parentKey] = newObj;
                }

                // Update expanded paths
                expandedPaths.add(pathToKey(targetPathArr));

                dragSourcePath = null;
                dragSourceKey = null;
                document.querySelectorAll('.drag-ghost').forEach(el => el.classList.remove('drag-ghost'));
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                renderAll();
                updateOutput();
                toast('Node moved successfully ✨');
            }

            // ──────────────────────────────────────
            //  FLOATING MENU
            // ──────────────────────────────────────
            function openFloatingMenu(event, pathArr, triggerElement) {
                closeFloatingMenu();
                closeTypeSwitcher();
                const pathKey = pathToKey(pathArr);
                activeMenuPathKey = pathKey;
                triggerElement.classList.add('active');

                const menu = document.getElementById('floatingMenu');
                const data = getByPath(masterData, pathArr);
                const type = getType(data);
                const isCollapsible = type === 'object' || type === 'array';

                let html = '';
                if (isCollapsible) {
                    html +=
                        `<button class="floating-menu-item" data-action="add-child"><i class="ph ph-plus"></i> Add Child</button>`;
                    html += `<div class="floating-menu-divider"></div>`;
                }
                html +=
                    `<button class="floating-menu-item" data-action="duplicate"><i class="ph ph-copy"></i> Duplicate</button>`;
                html +=
                    `<button class="floating-menu-item danger" data-action="delete"><i class="ph ph-trash"></i> Delete</button>`;

                menu.innerHTML = html;
                menu.style.display = 'flex';

                const rect = triggerElement.getBoundingClientRect();
                let top = rect.bottom + 5;
                let left = rect.left;
                if (top + 180 > window.innerHeight) top = rect.top - 180;
                if (left + 175 > window.innerWidth) left = window.innerWidth - 185;
                if (left < 8) left = 8;
                menu.style.top = top + 'px';
                menu.style.left = left + 'px';

                menu.onclick = (e) => {
                    const actionBtn = e.target.closest('.floating-menu-item');
                    if (!actionBtn) return;
                    const action = actionBtn.getAttribute('data-action');
                    handleMenuAction(action, pathArr, data, type);
                };
            }

            function closeFloatingMenu() {
                const menu = document.getElementById('floatingMenu');
                menu.style.display = 'none';
                menu.innerHTML = '';
                if (activeMenuPathKey) {
                    const header = document.querySelector(`.node-header[data-path-key="${CSS.escape(activeMenuPathKey)}"]`);
                    if (header) {
                        const trig = header.querySelector('.menu-trigger');
                        if (trig) trig.classList.remove('active');
                    }
                    activeMenuPathKey = null;
                }
            }

            function handleMenuAction(action, pathArr, data, type) {
                closeFloatingMenu();
                switch (action) {
                    case 'add-child':
                        if (type === 'array') addItemToArray(pathArr);
                        else addChildToNode(pathArr, type);
                        break;
                    case 'duplicate':
                        duplicateNode(pathArr);
                        break;
                    case 'delete':
                        deleteNode(pathArr);
                        break;
                }
            }

            function addChildToNode(pathArr, type) {
                const data = getByPath(masterData, pathArr);
                if (type === 'object' && !Array.isArray(data)) {
                    let newKey = 'newKey';
                    let counter = 1;
                    while (newKey in data) {
                        newKey = 'newKey_' + counter;
                        counter++;
                    }
                    data[newKey] = '';
                    expandedPaths.add(pathToKey(pathArr));
                }
                renderAll();
                updateOutput();
                toast('New property added ✨');
                setTimeout(() => {
                    const newPathKey = pathToKey([...pathArr, newKey || 'newKey']);
                    const input = document.querySelector(`.key-input[data-path-key="${CSS.escape(newPathKey)}"]`);
                    if (input) { input.focus();
                        input.select(); }
                }, 150);
            }

            function addItemToArray(pathArr) {
                const data = getByPath(masterData, pathArr);
                if (Array.isArray(data)) {
                    data.push('');
                    expandedPaths.add(pathToKey(pathArr));
                }
                renderAll();
                updateOutput();
                toast('New item added to array 📋');
                setTimeout(() => {
                    const newPathKey = pathToKey([...pathArr, String(data.length - 1)]);
                    const input = document.querySelector(`.value-editor[data-path-key="${CSS.escape(newPathKey)}"]`);
                    if (input) { input.focus();
                        input.select(); }
                }, 150);
            }

            function duplicateNode(pathArr) {
                if (pathArr.length === 0) {
                    toast('Cannot duplicate root');
                    return;
                }
                const parentPath = getParentPath(pathArr);
                const parent = parentPath.length > 0 ? getByPath(masterData, parentPath) : null;
                const original = getByPath(masterData, pathArr);
                const key = getLastKey(pathArr);
                const cloned = JSON.parse(JSON.stringify(original));

                if (Array.isArray(parent)) {
                    const idx = parseInt(key);
                    parent.splice(idx + 1, 0, cloned);
                } else if (typeof parent === 'object' && parent !== null) {
                    let newKey = key + '_copy';
                    let c = 1;
                    while (newKey in parent) {
                        newKey = key + '_copy_' + c;
                        c++;
                    }
                    parent[newKey] = cloned;
                }
                renderAll();
                updateOutput();
                toast('Node duplicated 📋');
            }

            function deleteNode(pathArr) {
                if (pathArr.length === 0) {
                    toast('Cannot delete root node');
                    return;
                }
                const pathKey = pathToKey(pathArr);
                const toRemove = [];
                expandedPaths.forEach(pk => {
                    if (pk === pathKey || pk.startsWith(pathKey + ',')) toRemove.push(pk);
                });
                toRemove.forEach(pk => expandedPaths.delete(pk));
                deleteByPath(masterData, pathArr);
                renderAll();
                updateOutput();
                toast('Node deleted 🗑');
            }

            // ──────────────────────────────────────
            //  TYPE SWITCHER
            // ──────────────────────────────────────
            function openTypeSwitcher(event, pathArr, badgeElement) {
                closeFloatingMenu();
                closeTypeSwitcher();
